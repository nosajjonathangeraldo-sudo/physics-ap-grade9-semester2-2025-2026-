<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Physics AP Chapter 4 and Chapter 5 2026-2027</title>

<style>

body {
    height: 100vh;
    overflow: hidden;
    background: radial-gradient(circle at 20% 30%, #3a0ca3 0%, #1a0033 40%, #000010 100%);
    color: white;
    position: relative;
}

body::before {
    content: "";
    position: absolute;
    width: 200%;
    height: 200%;
    background: transparent url('https://www.transparenttextures.com/patterns/stardust.png');
    animation: moveStars 60s linear infinite;
    opacity: 0.4;
}

@keyframes moveStars {
    from { transform: translate(0, 0); }
    to { transform: translate(-500px, -500px); }
}

.container {
    position: relative;
    z-index: 2;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
}

.glass-panel {
    width: 420px;
    padding: 40px;
    border-radius: 20px;
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(15px);
    border: 1px solid rgba(255, 255, 255, 0.15);
    box-shadow: 0 0 40px rgba(128, 0, 255, 0.6);
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    text-align: center;
}

h1 {
    font-size: 28px;
    margin-bottom: 10px;
    background: linear-gradient(90deg, #c77dff, #7209b7);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: 1.5px;
}

h2 {
    font-size: 18px;
    margin-bottom: 20px;
    opacity: 0.8;
}

p {
    opacity: 0.8;
    margin-bottom: 30px;
    font-size: 14px;
}

button {
    padding: 12px 30px;
    border-radius: 30px;
    border: 1px solid #c77dff;
    background: transparent;
    color: #c77dff;
    cursor: pointer;
    font-size: 14px;
    letter-spacing: 1px;
    transition: 0.3s ease;
    box-shadow: 0 0 15px #7209b7;
}

button:hover {
    background: #7209b7;
    color: white;
    box-shadow: 0 0 25px #c77dff;
    transform: scale(1.05);
}

.orb {
    position: absolute;
    border-radius: 50%;
    background: radial-gradient(circle, #9d4edd, transparent);
    filter: blur(30px);
    animation: float 2s ease-in-out infinite alternate;
}

.orb1 {
    width: 200px;
    height: 200px;
    top: 10%;
    left: 15%;
}

.orb2 {
    width: 150px;
    height: 150px;
    bottom: 15%;
    right: 20%;
    animation-delay: 3s;
}

@keyframes float {
    from { transform: translateY(-20px); }
    to { transform: translateY(20px); }
}

/* School logo on top right */
.school-logo {
    position: absolute;
    top: 20px;
    right: 20px;
    width: 80px; /* adjust size as needed */
    height: auto;
    z-index: 5;
}

</style>
</head>
<body>

<img src="Laurensia.png" alt="School Logo" class="school-logo">

<div class="orb orb1"></div>
<div class="orb orb2"></div>

<div class="container">
    <div class="glass-panel">
        <h1>Physics Hub</h1>
        <h2>Physics AP Chapter 4 and Chapter 5 2026-2027</h2>
        <p>Explore the wonders of physics in an immersive environment.<br><br>
           By: Dante 6/9D, Eugene 10/9D, Alden 11/9D, Jason 13/9D
        </p>
        <a href="materials.html">
            <button>ENTER THE PHYSICS HUB</button>
        </a>    
    </div>
</div>

</body>
</html>
